name: 自動品牌名單爬蟲

on:
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨一點執行
  workflow_dispatch:      # 關鍵：允許 GAS 透過 API 手動觸發

jobs:
  run_crawler:
    runs-on: ubuntu-latest
    # 建議加上權限設定，確保 Action 有權限讀取內容
    permissions:
      contents: read

    steps:
      - name: 複製程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # 加入快取可以縮短每次執行的時間
          cache: 'pip'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth pandas beautifulsoup4 requests googlesearch-python

      - name: 執行爬蟲程式
        env:
          # 這裡必須對應你在 GitHub Settings -> Secrets 中設定的名稱
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # 備註：Node 20+ 通常不需要手動強制 Node 24，除非你的環境有特殊報錯
        run: python crawler.py
