name: 自動品牌名單爬蟲

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run_crawler:
    runs-on: ubuntu-latest
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v4 # 升級到 v4

      - name: 安裝 Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          pip install google-api-python-client google-auth pandas beautifulsoup4 requests googlesearch-python

      - name: 執行爬蟲程式
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 強制使用 Node 24
        run: python crawler.py
